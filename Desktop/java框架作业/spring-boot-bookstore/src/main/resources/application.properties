spring.application.name=spring-boot-bookstore
server.port=8080

spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql:///books
spring.datasource.username=root
spring.datasource.password=123456

mybatis.typeAliasesPackage=org.example.springbootbookstore.entity
mybatis.mapperLocations=classpath:Mapper/*.xml
mybatis.configuration.mapUnderscoreToCamelCase=true
mybatis.configuration.cacheEnabled=false

mybatis-plus.mapper-locations=classpath:Mapper/*.xml
mybatis-plus.type-aliases-package=org.example.springbootbookstore.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true

spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
